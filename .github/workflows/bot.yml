name: X Affiliate Bot

on:
  schedule:
    # JST = UTC+9 なので UTC で設定
    - cron: "0 23 * * *"   # JST 08:00
    - cron: "0 3 * * *"    # JST 12:00
    - cron: "0 10 * * *"   # JST 19:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: "投稿せずに内容確認のみ (true/false)"
        required: false
        default: "false"
      no_image:
        description: "画像生成をスキップ (true/false)"
        required: false
        default: "false"
      posts:
        description: "1回あたりの投稿件数"
        required: false
        default: "1"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          X_API_KEY:              ${{ secrets.X_API_KEY }}
          X_API_SECRET:           ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:         ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET:  ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN:         ${{ secrets.X_BEARER_TOKEN }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          HF_API_TOKEN:           ${{ secrets.HF_API_TOKEN }}
          RAKUTEN_AFFILIATE_ID:   ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          POSTS_PER_RUN:          ${{ github.event.inputs.posts || '1' }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.no_image }}" = "true" ]; then
            ARGS="$ARGS --no-image"
          fi
          python src/main.py --posts ${{ github.event.inputs.posts || '1' }} $ARGS
