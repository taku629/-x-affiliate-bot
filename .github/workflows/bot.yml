name: X Affiliate Bot

on:
  schedule:
    # JST 8:00 / 12:00 / 19:00 (UTC 23:00 / 03:00 / 10:00)
    - cron: "0 23 * * *"
    - cron: "0 3 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (投稿せず内容確認のみ)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      no_image:
        description: "No image (画像生成をスキップ)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      posts:
        description: "投稿件数"
        required: false
        default: "1"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          NO_IMAGE="${{ github.event.inputs.no_image || 'false' }}"
          POSTS="${{ github.event.inputs.posts || '1' }}"

          ARGS="--posts $POSTS"
          [ "$DRY_RUN" = "true" ] && ARGS="$ARGS --dry-run"
          [ "$NO_IMAGE" = "true" ] && ARGS="$ARGS --no-image"

          python src/main.py $ARGS
